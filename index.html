<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traplixy Hub | Gaming Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        body { 
            background-color: #05070a; 
            color: #e2e8f0; 
            font-family: 'Space Grotesk', sans-serif;
            scroll-behavior: smooth;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(to right, rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            mask-image: radial-gradient(circle, black, transparent 80%);
        }

        .glass { 
            background: rgba(10, 15, 25, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .glow-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .glow-card:hover { 
            transform: translateY(-8px);
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.4);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 1rem;
            border: 2px solid rgba(59, 130, 246, 0.2);
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Feature: Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #10b981;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="antialiased">
    <div class="bg-grid"></div>

    <div id="toast">CODE COPIED TO CLIPBOARD!</div>

    <nav class="sticky top-0 z-50 glass px-8 py-4 flex justify-between items-center border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter uppercase italic">
            TRAPLIXY<span class="text-blue-500">HUB</span>
        </div>
        <div class="space-x-8 hidden md:flex font-bold text-xs uppercase tracking-[0.2em] text-gray-400">
            <a href="#" class="hover:text-blue-400 transition">Dashboard</a>
            <a href="#scripts" class="hover:text-blue-400 transition text-white">Scripts</a>
            <a href="https://discord.gg/Py8bEqJgnD" target="_blank" class="hover:text-blue-400 transition">Community</a>
        </div>
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="w-10 h-10 glass rounded-lg flex items-center justify-center hover:bg-blue-600/20 transition">
            <i class="fa-solid fa-chevron-up text-blue-500"></i>
        </button>
    </nav>

    <header class="relative py-16 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-black mb-12 tracking-tighter italic uppercase">
            TRAPLIXY <span class="text-blue-500">V2</span>
        </h1>

        <div class="max-w-3xl mx-auto mb-16">
            <div class="glass p-3 rounded-2xl">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/2CHY-gP8dyM" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
            <a href="https://youtube.com/@Traplixy?sub_confirmation=1" target="_blank" class="inline-flex items-center gap-2 mt-6 px-6 py-3 bg-red-600 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-red-700 transition shadow-lg shadow-red-600/20">
                <i class="fa-brands fa-youtube"></i> Subscribe for Updates
            </a>
        </div>
        
        <div class="max-w-xl mx-auto relative">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" id="scriptSearch" onkeyup="searchScripts()" placeholder="FILTER SCRIPTS..." 
                   class="w-full bg-[#0d1117] border border-white/10 py-5 pl-14 pr-6 rounded-2xl outline-none text-sm font-bold tracking-widest text-white focus:border-blue-500 transition-all">
        </div>
    </header>

    <main id="scripts" class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="glass p-8 rounded-2xl glow-card script-card" data-title="rivals">
                <div class="flex justify-between items-center mb-6">
                    <div class="p-4 bg-orange-500/10 rounded-xl border border-orange-500/20">
                        <i class="fa-solid fa-fire text-orange-500 text-xl"></i>
                    </div>
                    <span class="text-[10px] font-black text-orange-500 border border-orange-500/30 px-2 py-1 rounded">HOT</span>
                </div>
                <h3 class="text-xl font-black mb-4 uppercase italic">Rivals Combat Hub</h3>
                <a href="https://ystealaternos-source.github.io/scripthub/" target="_blank" class="block w-full bg-blue-600 text-center py-4 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-blue-500 transition">Get Hub</a>
            </div>

            <div class="glass p-8 rounded-2xl glow-card script-card" data-title="arsenal">
                <div class="flex justify-between items-center mb-6">
                    <div class="p-4 bg-red-500/10 rounded-xl border border-red-500/20">
                        <i class="fa-solid fa-crosshairs text-red-500 text-xl"></i>
                    </div>
                    <span class="text-[10px] font-black text-red-500 border border-red-500/30 px-2 py-1 rounded">NEW</span>
                </div>
                <h3 class="text-xl font-black mb-4 uppercase italic">Arsenal Silent Aim</h3>
                <button onclick="copyScript('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/ystealaternos-source/SiteLaunchers/main/scripts/arsenal.lua\'))()')" 
                        class="w-full bg-slate-800 text-center py-4 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-slate-700 transition border border-white/5">Copy Loadstring</button>
            </div>

        </div>
    </main>

    <script>
        function showToast() {
            var x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
        }

        function copyScript(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast();
            });
        }

        function searchScripts() {
            let input = document.getElementById('scriptSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('script-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getAttribute('data-title');
                cards[i].style.display = title.includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
